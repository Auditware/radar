version: 0.1.0
author: forefy
language: solidity
accent: ""
name: Governance Execute Without Timelock
description: Governance execution paths should validate a timelock before executing proposal actions.
severity: High
certainty: Low
rule: |
  for source, nodes in ast:
    try:
        functions = nodes.find_all_functions().exit_on_none()
        for function in functions:
            try:
                function_name = function.metadata.get("name", "")
                if function_name not in ("execute", "emergencyCommit"):
                    continue
                external_calls = function.find_nodes_by_member_names("call")
                timestamp_nodes = function.find_nodes_by_member_names("timestamp")
                if len(external_calls) > 0 and len(timestamp_nodes) == 0:
                    print(function.to_result())
            except:
                continue
    except:
        continue
