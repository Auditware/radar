version: 0.1.0
author: forefy
language: solidity
accent: ""
name: Missing Two Step Ownership Transfer
description: Ownership transfer flows should require a second acceptance step before the new owner takes control.
severity: Medium
certainty: Medium
rule: |
  all_function_names = set()
  for source, nodes in ast:
    try:
        for function in nodes.find_all_functions().nodes:
            all_function_names.add(function.metadata.get("name", ""))
    except:
        continue
  if "acceptOwnership" in all_function_names or "claimOwnership" in all_function_names:
    pass
  else:
    for source, nodes in ast:
      try:
          for function in nodes.find_all_functions().nodes:
              try:
                  if function.metadata.get("name") == "transferOwnership":
                      print(function.to_result())
              except:
                  continue
      except:
          continue
